            "@type": "Answer",
            "text": "The Falls Park walking tour is a GPS-triggered audio experience. You access the tour via a web app (no app download needed). As you walk to each of the 10 stops around Falls Park and downtown Greenville, the audio automatically plays when you enter the geofenced area. You can also manually trigger the audio at each stop with a button. The tour takes approximately 45 minutes to complete and covers 1.2 miles."

        {
          "@type": "Question",
          "name": "How much does the tour cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer a pay-what-you-want model. You can pay anywhere from $3 to $15 for the full tour experience. This allows you to support the tour based on your budget and how much you enjoyed it."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to download an app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No! The Falls Park tour runs directly in your mobile web browser. Simply scan the QR code or visit our website on your phone, and you can start the tour immediately. No app installation required."
          }
        },
        {
          "@type": "Question",
          "name": "How long is the tour?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The complete Falls Park walking tour takes approximately 45 minutes to finish and covers 1.2 miles. However, you can pause at any point and continue later. The tour includes 10 stops with professional narration at each location."
          }
        },
        {
          "@type": "Question",
          "name": "Can I pause the tour and come back?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! You can pause the tour at any time and return to it later. Your progress is saved, so you can pick up where you left off. This makes it easy to take breaks or spread the tour across multiple visits."
          }
        },
        {
          "@type": "Question",
          "name": "Is the tour accessible for wheelchairs and strollers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Falls Park and the downtown Greenville areas are mostly accessible for wheelchairs and strollers. Most of the walking path is paved and relatively flat. However, some areas may have uneven surfaces or inclines. We recommend checking specific route sections before visiting, and our map interface will help you navigate accessible paths."
          }
        },
        {
          "@type": "Question",
          "name": "What if GPS doesn't work at a stop?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GPS can sometimes be unreliable, especially in urban areas with tall buildings. That's why we include manual play buttons at each stop. If the automatic GPS trigger doesn't work, you can simply tap the 'Play Audio' button to hear the narration for that stop."
          }
        },
        {
          "@type": "Question",

            "@type": "Answer",
            "text": "The tour is available 24/7 and can be enjoyed any day of the year. However, the best experience is typically during daylight hours so you can see the locations and take photos. Sunrise or sunset walks offer beautiful lighting, and weekday mornings tend to be less crowded than weekends."
          }
        },
        {
          "@type": "Question",
          "name": "Can I take the tour with kids?",

            "@type": "Answer",
            "text": "Absolutely! The Falls Park tour is family-friendly and suitable for children of various ages. The narration is engaging and educational, making it a great way to teach kids about Greenville's history. The 45-minute duration and 1.2-mile distance are manageable for most children, and you can pause whenever needed."
